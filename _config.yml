title: "focal"
tagline: "a research collective."
description: "ops@focal.org"
url: https://blog.focal.org
baseurl: ""
author:
  name: focaldotorg

defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/splash.png
      keywords: "blog, focal, research collective, non-profit research, mechanism design, economics, voting theory, focal.org, focaldotorg, thinktank"

