
<div class="modal" id="ml-modal" aria-hidden="true">
  <div class="modal__overlay" tabindex="-1" data-micromodal-close>
    <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="ml-modal-title">
      <div class="modal__header">
        <h2 class="modal__title" id="ml-modal-title">Mailing list</h2>
        <button class="modal__close" aria-label="Close" data-micromodal-close></button>
      </div>
      <div class="modal__content">
        <p class="modal__desc">Enter your email address to subscribe to our newsletter, gain access to community calls, development logs and much more.</p>
        <div class="modal__form">
          <input
            type="email"
            id="ml-email"
            placeholder="your@email.com"
            autocomplete="email"
            spellcheck="false"
          />
          <button id="ml-submit">submit</button>
        </div>
        <p id="ml-status" aria-live="polite"></p>
      </div>
    </div>
  </div>
</div>

<style>
  a.mailing-list-trigger {
    cursor: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjMiIHZpZXdCb3g9IjAgMCAyMCAyMyIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE5LjE2NDEgMTUuNzE4TDAuMDAwNDUwNzEyIC0yLjc4NjkyZS0wNUwwLjAxNDU4ODUgMjIuNzgyOUw2LjQxNTA2IDE0Ljk4MjZMMTkuMTY0MSAxNS43MThaIiBmaWxsPSJibGFjayIvPgo8L3N2Zz4K") 0 0, pointer;
  }

  .modal { display: none; }
  .modal.is-open { display: block; }

  .modal__overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .modal__container {
    background: #fff;
    padding: 2.5rem;
    width: min(480px, 75vw);
    border: 1px solid #000;
    will-change: transform, opacity;
  }

  /* enter: slide up from below centre */
  @keyframes mlSlideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* exit: span up and out */
  @keyframes mlSpanUp {
    from { transform: translateY(0);     opacity: 1; }
    to   { transform: translateY(-80px); opacity: 0; }
  }

  .modal__container[data-state="opening"] {
    animation: mlSlideUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .modal__container[data-state="closing"] {
    animation: mlSpanUp 0.28s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  .modal__header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .modal__title {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: #000;
    margin: 0;
  }

  .modal__close {
    background: none;
    border: none;
    padding: 0;
    cursor: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjMiIHZpZXdCb3g9IjAgMCAyMCAyMyIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE5LjE2NDEgMTUuNzE4TDAuMDAwNDUwNzEyIC0yLjc4NjkyZS0wNUwwLjAxNDU4ODUgMjIuNzgyOUw2LjQxNTA2IDE0Ljk4MjZMMTkuMTY0MSAxNS43MThaIiBmaWxsPSJibGFjayIvPgo8L3N2Zz4K") 0 0, pointer;
  }

  .modal__close::before {
    content: '×';
    font-size: 1.4rem;
    color: #999;
    line-height: 1;
  }

  .modal__desc {
    font-size: 1rem;
    color: #444;
    margin-bottom: 1.5rem;
    line-height: 1.7;
  }

  .modal__form {
    display: flex;
    border: 1px solid #000;
  }

  #ml-email {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.65rem 0.85rem;
    font-size: 0.9rem;
    font-family: inherit;
    background: transparent;
    color: #000;
    cursor: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjkiIGhlaWdodD0iMTEiIHZpZXdCb3g9IjAgMCAyOSAxMSIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE1Ljc1IDBWNC43NUgyOVY2LjI1SDE1Ljc1VjExSDE0LjI1VjYuMjVIMFY0Lwc1SDE0LjI1VjBIMTUuNzVaIiBmaWxsPSJibGFjayIvPgo8L3N2Zz4K") 14 5, text;
  }

  #ml-email::placeholder { color: #aaa; }

  #ml-submit {
    border: none;
    border-left: 1px solid #000;
    background: #000;
    color: #fff;
    padding: 0.65rem 1.1rem;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: inherit;
    cursor: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjMiIHZpZXdCb3g9IjAgMCAyMCAyMyIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE5LjE2NDEgMTUuNzE4TDAuMDAwNDUwNzEyIC0yLjc4NjkyZS0wNUwwLjAxNDU4ODUgMjIuNzgyOUw2LjQxNTA2IDE0Ljk4MjZMMTkuMTY0MSAxNS43MThaIiBmaWxsPSJibGFjayIvPgo8L3N2Zz4K") 0 0, pointer;
  }

  #ml-status {
    font-size: 0.85rem;
    margin-top: 0.85rem;
    min-height: 1.2em;
    color: #666;
    letter-spacing: 0.02em;
  }

  #ml-status.error   { color: #c00; }
  #ml-status.success { color: #000; }
</style>

<script src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
<script>
  (function() {
    var emailEl   = document.getElementById('ml-email');
    var submitBtn = document.getElementById('ml-submit');
    var status    = document.getElementById('ml-status');

    MicroModal.init({
      onShow: function(modal) {
        var container = modal.querySelector('.modal__container');
        container.setAttribute('data-state', 'opening');
        emailEl.focus();
      },
      onClose: function(modal) {
        var container = modal.querySelector('.modal__container');
        container.setAttribute('data-state', 'closing');
        status.textContent = '';
        status.className = '';
      },
      awaitCloseAnimation: true,
      disableScroll: true
    });

    submitBtn.addEventListener('click', function() {
      var email = emailEl.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        status.textContent = 'please enter a valid email.';
        status.className = 'error';
        return;
      }
      status.textContent = "you're on the list.";
      status.className = 'success';
      emailEl.value = '';
      setTimeout(function() { MicroModal.close('ml-modal'); }, 2200);
    });

    emailEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitBtn.click();
    });
  })();
</script>
