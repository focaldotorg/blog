<div class="modal" id="ml-modal" aria-hidden="true">
  <div class="modal__overlay" tabindex="-1" data-micromodal-close>
    <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="ml-modal-title">
      <div class="modal__header">
        <h2 class="modal__title" id="ml-modal-title">Mailing list</h2>
        <button class="modal__close" aria-label="Close" data-micromodal-close></button>
      </div>
      <div class="modal__content">
        <p class="modal__desc">
          Most people see the conclusions, subscribers see the work. Receive community call invitations, development logs and research updates to your inbox.
        </p>
        <div class="modal__form">
          <input
            type="email"
            id="ml-email"
            placeholder="your@email.com"
            autocomplete="email"
            spellcheck="false"
          />
          <button id="ml-submit">submit</button>
        </div>
        <p id="ml-status" aria-live="polite"></p>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
  (function() {
    firebase.initializeApp({
      apiKey:            "AIzaSyDjm-1pNzhB1wFceJNL4prseXBCtIi57TA",
      authDomain:        "focal-mailing-list-94ac3.firebaseapp.com",
      projectId:         "focal-mailing-list-94ac3",
      storageBucket:     "focal-mailing-list-94ac3.firebasestorage.app",
      messagingSenderId: "325708458975",
      appId:             "1:325708458975:web:73147e2b73fa1d014bf26a"
    });

    firebase.appCheck().activate(
      new firebase.appCheck.ReCaptchaV3Provider('6LeEiZ0sAAAAAFDaZL_9hsqynCiecEl1MW9vto0t'),
      true
    );

    var db        = firebase.firestore();
    var emailEl   = document.getElementById('ml-email');
    var submitBtn = document.getElementById('ml-submit');
    var status    = document.getElementById('ml-status');

    MicroModal.init({
      onShow: function(modal) {
        modal.querySelector('.modal__container').setAttribute('data-state', 'opening');
        emailEl.focus();
      },
      onClose: function(modal) {
        modal.querySelector('.modal__container').setAttribute('data-state', 'closing');
        status.textContent = '';
        status.className = '';
      },
      awaitCloseAnimation: true,
      disableScroll: true
    });

    submitBtn.addEventListener('click', function() {
      var email = emailEl.value.trim();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        status.textContent = 'Please enter a valid email.';
        status.className = 'error';
        return;
      }

      submitBtn.disabled = true;
      status.textContent = '';

      db.collection('waitlist').doc(email).set({
        email: email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(function() {
        status.textContent = "You're registered.";
        status.className = 'success';
        emailEl.value = '';
        setTimeout(function() { MicroModal.close('ml-modal'); }, 2200);
      })
      .catch(function(err) {
        console.error(err);
        if (err.code === 'permission-denied') {
          status.textContent = 'Already registered.';
        } else {
          status.textContent = 'Something went wrong. Try again.';
        }
        status.className = 'error';
      })
      .finally(function() {
        submitBtn.disabled = false;
      });
    });

    emailEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitBtn.click();
    });
  })();
</script>
