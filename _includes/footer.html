<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>
  <div class="wrapper">

    <div class="footer-col-wrapper">
      {%- if site.author %}
        <ul class="contact-list">
          {% if site.author.name -%}
            <li class="p-name">
              <a href="https://twitter.com/{{ site.author.name }}">
                @{{ site.author.name | escape }}
              </a>
            </li>
          {% endif -%}
        </ul>
        <div class="idiom">
         focal ® 2026
        </div>
      {%- endif %}
    </div>

    <div class="social-links">
      {%- include social.html -%}
    </div>
  </div>
</footer>
